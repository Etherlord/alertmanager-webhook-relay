name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

concurrency: release-${{ github.ref }}

jobs:
  release:
    name: Build and Push Docker Image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/etherlord/alertmanager-webhook-relay
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: Create GitHub Release
    needs: release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build binaries
        run: |
          LDFLAGS="-s -w -X main.version=${{ env.VERSION }}"
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -buildvcs=false -ldflags="$LDFLAGS" -o alertmanager-webhook-relay-linux-amd64 .
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -buildvcs=false -ldflags="$LDFLAGS" -o alertmanager-webhook-relay-linux-arm64 .

      - name: Generate checksums
        run: sha256sum alertmanager-webhook-relay-linux-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ## Docker Image
            `ghcr.io/etherlord/alertmanager-webhook-relay:${{ env.VERSION }}`
          files: |
            alertmanager-webhook-relay-linux-amd64
            alertmanager-webhook-relay-linux-arm64
            checksums.txt
