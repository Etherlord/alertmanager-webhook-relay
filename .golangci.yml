version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - errorlint
    - gocritic
    - nilerr
    - noctx
    - revive
  settings:
    errcheck:
      check-type-assertions: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: package-comments
        - name: unused-parameter
  exclusions:
    presets:
      - std-error-handling
