services:
  dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - gomodcache:/go/pkg/mod
    working_dir: /app
    environment:
      - PORT=${PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SHUTDOWN_TIMEOUT=${SHUTDOWN_TIMEOUT:-15s}
      - DATABASE_DRIVER=${DATABASE_DRIVER:-sqlite}
      - DATABASE_DSN=${DATABASE_DSN:-data/alerts.db}
      - MAX_PAYLOAD_SIZE=${MAX_PAYLOAD_SIZE:-1048576}
      - MAX_ALERTS_PER_PAYLOAD=${MAX_ALERTS_PER_PAYLOAD:-100}
      - NOTIFY_POLL_INTERVAL=${NOTIFY_POLL_INTERVAL:-5s}
      - NOTIFY_BATCH_SIZE=${NOTIFY_BATCH_SIZE:-50}
      - NOTIFY_QUEUE_SIZE=${NOTIFY_QUEUE_SIZE:-100}
      - NOTIFY_SEND_TIMEOUT=${NOTIFY_SEND_TIMEOUT:-30s}
      - PACHCA_TOKEN=${PACHCA_TOKEN:-}
      - PACHCA_BASE_URL=${PACHCA_BASE_URL:-https://api.pachca.com}
      - PACHCA_CHAT_ID=${PACHCA_CHAT_ID:-}
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST:-}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-587}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - EMAIL_TO=${EMAIL_TO:-}
      - EMAIL_USERNAME=${EMAIL_USERNAME:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - EMAIL_TLS_MODE=${EMAIL_TLS_MODE:-starttls}
      - EMAIL_SUBJECT_PREFIX=${EMAIL_SUBJECT_PREFIX:-[Alert]}
    profiles:
      - tools

  mailpit:
    image: axllent/mailpit:v1.29.4
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true
      - MP_MAX_MESSAGES=100
    ports:
      - "1025:1025"
      - "8025:8025"
    profiles:
      - test

  migrate:
    image: ghcr.io/pressly/goose:3.27.0
    volumes:
      - ./migrations/sqlite:/migrations
      - ./data:/data
    profiles:
      - db

volumes:
  gomodcache:
