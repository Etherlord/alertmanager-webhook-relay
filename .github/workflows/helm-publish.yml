# Prerequisites:
# Initialize the gh-pages branch before first use:
#
#   git checkout --orphan gh-pages
#   git rm -rf .
#   echo "# Helm Chart Repository" > README.md
#   cat > index.yaml <<'EOF'
#   apiVersion: v1
#   entries: {}
#   generated: "2026-03-28T00:00:00Z"
#   EOF
#   git add README.md index.yaml
#   git commit -m "chore: initialize gh-pages for Helm repository"
#   git push origin gh-pages
#   git checkout -
#
# Then enable GitHub Pages: Settings -> Pages -> Source: gh-pages branch, / (root)
# Helm repo URL: https://etherlord.github.io/alertmanager-webhook-relay

name: Helm Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency: helm-publish

jobs:
  helm-publish:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-24.04
    env:
      CHART_DIR: deploy/helm/alertmanager-webhook-relay
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Set chart version from tag
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" "${CHART_DIR}/Chart.yaml"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "${CHART_DIR}/Chart.yaml"

      - name: Package Helm chart
        run: helm package "$CHART_DIR"

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Helm repository index
        run: |
          cp alertmanager-webhook-relay-*.tgz gh-pages/
          helm repo index --url https://etherlord.github.io/alertmanager-webhook-relay gh-pages/

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.yaml alertmanager-webhook-relay-*.tgz
          git commit -m "chore: publish helm chart ${VERSION}"
          git push
