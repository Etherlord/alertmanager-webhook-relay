{{- if .Values.secret.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "alertmanager-webhook-relay.fullname" . }}
  labels:
    {{- include "alertmanager-webhook-relay.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_DSN: {{ .Values.secret.DATABASE_DSN | quote }}
  PACHCA_TOKEN: {{ .Values.secret.PACHCA_TOKEN | quote }}
  EMAIL_USERNAME: {{ .Values.secret.EMAIL_USERNAME | quote }}
  EMAIL_PASSWORD: {{ .Values.secret.EMAIL_PASSWORD | quote }}
{{- end }}
