services:
  dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - gomodcache:/go/pkg/mod
    working_dir: /app
    environment:
      - PORT=${PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SHUTDOWN_TIMEOUT=${SHUTDOWN_TIMEOUT:-15s}
    profiles:
      - tools

volumes:
  gomodcache:
